name: CIS System CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天凌晨2点运行（UTC时间）
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发

env:
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.11'

jobs:
  # 代码质量检查
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: '**/package.json'
    
    - name: Install dependencies
      run: |
        cd frontend && npm ci
        cd ../backend && npm ci
      
    - name: Run ESLint
      run: |
        cd frontend && npm run lint
        cd ../backend && npm run lint
      
    - name: Run Prettier check
      run: |
        cd frontend && npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
        cd ../backend && npx prettier --check "src/**/*.{ts,js,json}"
      
    - name: TypeScript type check
      run: |
        cd frontend && npx tsc --noEmit
        cd ../backend && npx tsc --noEmit

  # 前端构建和测试
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package.json'
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test -- --coverage
      
    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        directory: ./frontend/coverage
        flags: frontend

  # 后端构建和测试
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'backend/package.json'
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci
      
    - name: Build backend
      working-directory: ./backend
      run: npm run build
      
    - name: Run backend tests
      working-directory: ./backend
      run: npm test -- --coverage
      
    - name: Upload backend coverage
      uses: codecov/codecov-action@v3
      with:
        directory: ./backend/coverage
        flags: backend

  # 数据中台检查
  data-platform-check:
    name: Data Platform Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: 'data-platform/requirements.txt'
    
    - name: Install Python dependencies
      working-directory: ./data-platform
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      
    - name: Check Python code quality
      working-directory: ./data-platform
      run: |
        python -m py_compile *.py 2>/dev/null || true
        echo "Python syntax check completed"

  # Docker构建检查
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, data-platform-check]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker images
      run: |
        docker-compose -f docker-compose.yml build --no-cache
      
    - name: Verify Docker images
      run: |
        docker images | grep cis-

  # 安全扫描
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # 部署到测试环境（手动触发）
  deploy-to-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to test environment
      run: |
        echo "Deploying to test environment..."
        # 这里添加实际的部署脚本
        # 例如：ssh到服务器，执行docker-compose up等
        
    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # 这里添加冒烟测试脚本

  # 生成部署报告
  generate-report:
    name: Generate CI/CD Report
    runs-on: ubuntu-latest
    needs: [lint-and-format, frontend-build, backend-build, data-platform-check, docker-build, security-scan]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Generate summary report
      run: |
        echo "# CI/CD Pipeline Report" >> report.md
        echo "## Execution Time: $(date)" >> report.md
        echo "## Branch: ${{ github.ref }}" >> report.md
        echo "## Commit: ${{ github.sha }}" >> report.md
        echo "" >> report.md
        echo "### Job Status:" >> report.md
        echo "- Lint & Format: ${{ needs.lint-and-format.result }}" >> report.md
        echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> report.md
        echo "- Backend Build: ${{ needs.backend-build.result }}" >> report.md
        echo "- Data Platform: ${{ needs.data-platform-check.result }}" >> report.md
        echo "- Docker Build: ${{ needs.docker-build.result }}" >> report.md
        echo "- Security Scan: ${{ needs.security-scan.result }}" >> report.md
        echo "" >> report.md
        echo "### Next Steps:" >> report.md
        echo "1. Review the test results" >> report.md
        echo "2. Check security scan findings" >> report.md
        echo "3. Deploy to test environment if all checks pass" >> report.md
        
    - name: Upload report
      uses: actions/upload-artifact@v3
      with:
        name: ci-cd-report
        path: report.md

# 工作流通知
notify:
  name: Send Notification
  runs-on: ubuntu-latest
  needs: [generate-report]
  if: always()
  
  steps:
  - name: Send Slack notification
    uses: 8398a7/action-slack@v3
    with:
      status: ${{ job.status }}
      channel: '#cis-system-ci'
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  
  - name: Send email notification
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      username: ${{ secrets.MAIL_USERNAME }}
      password: ${{ secrets.MAIL_PASSWORD }}
      subject: "CIS System CI/CD Pipeline: ${{ job.status }}"
      to: ${{ secrets.NOTIFICATION_EMAIL }}
      from: CIS System CI/CD <ci@cis-system.com>
      body: |
        CI/CD Pipeline execution completed.
        
        Status: ${{ job.status }}
        Workflow: ${{ github.workflow }}
        Branch: ${{ github.ref }}
        Commit: ${{ github.sha }}
        
        View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}