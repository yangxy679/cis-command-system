version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: cis-postgres
    environment:
      POSTGRES_DB: cis_system
      POSTGRES_USER: cis_admin
      POSTGRES_PASSWORD: cis_password_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cis_admin -d cis_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: cis-redis
    command: redis-server --appendonly yes --requirepass redis_password_2026
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cis-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: cis-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://cis_admin:cis_password_2026@postgres:5432/cis_system
      REDIS_URL: redis://:redis_password_2026@redis:6379
      JWT_SECRET: cis_jwt_secret_2026_development
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cis-network
    command: npm run start:dev

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cis-frontend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_DATA_PLATFORM_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cis-network
    command: npm run dev -- --host

  # 数据中台
  data-platform:
    build:
      context: ./data-platform
      dockerfile: Dockerfile.dev
    container_name: cis-data-platform
    environment:
      DATABASE_URL: postgresql://cis_admin:cis_password_2026@postgres:5432/cis_system
      REDIS_URL: redis://:redis_password_2026@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://cis_admin:cis_password_2026@postgres:5432/cis_system
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://cis_admin:cis_password_2026@postgres:5432/cis_system
      AIRFLOW__CELERY__BROKER_URL: redis://:redis_password_2026@redis:6379/0
    volumes:
      - ./data-platform:/app
      - airflow_data:/opt/airflow
    ports:
      - "8000:8000"
      - "8080:8080"  # Airflow UI
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cis-network
    command: >
      sh -c "
      airflow db init &&
      airflow users create --username admin --password airflow_admin_2026 --firstname Admin --lastname User --role Admin --email admin@cis-system.com &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: cis-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - cis-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: cis-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - data-platform
    networks:
      - cis-network

  # 监控 - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: cis-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cis-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # 监控 - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: cis-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=grafana_admin_2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - cis-network

volumes:
  postgres_data:
  redis_data:
  airflow_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  cis-network:
    driver: bridge